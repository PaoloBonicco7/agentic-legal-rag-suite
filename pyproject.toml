[project]
name = "agentic-legal-rag-suite"
version = "0.1.0"
description = "Development environment for agentic legal rag suite"
authors = [
    {name = "paolo.bonicco",email = "paolo.bonicco@valuepartners.com"}
]
readme = "README.md"
requires-python = "^3.11"
dependencies = [
    "requests>=2.32.0,<3.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "jupyter>=1.1.1,<2.0.0",
    "ipykernel (>=7.2.0,<8.0.0)",
    "beautifulsoup4 (>=4.14.3,<5.0.0)",
    "lxml (>=6.0.2,<7.0.0)",
    "langchain (>=1.2.10,<2.0.0)",
    "langgraph (>=1.0.10,<2.0.0)",
    "langchain-openai (>=1.1.10,<2.0.0)",
    "pydantic-ai (>=1.63.0,<2.0.0)",
    "langchain-qdrant (>=1.1.0,<2.0.0)",
    "qdrant-client>=1.11.0,<2.0.0",
    "pandas (>=3.0.1,<4.0.0)",
    "tqdm>=4.67.0,<5.0.0",
    "pytest (>=9.0.2,<10.0.0)",
    "matplotlib (>=3.10.8,<4.0.0)"
]

[project.optional-dependencies]
# Optional: more robust HTML parsing backend. The code falls back to stdlib if not installed.
html = [
    "beautifulsoup4>=4.14.3,<5.0.0",
    "lxml>=6.0.2,<7.0.0"
]

[tool.poetry]
package-mode = false


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
