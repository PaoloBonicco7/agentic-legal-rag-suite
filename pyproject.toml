[project]
name = "agentic-legal-rag-suite"
version = "0.1.0"
description = "Development environment for agentic legal rag suite"
authors = [
    {name = "paolo.bonicco",email = "paolo.bonicco@valuepartners.com"}
]
readme = "README.md"
requires-python = "^3.11"
dependencies = [
    "requests>=2.32.0,<3.0.0",
    "python-dotenv>=1.0.0,<2.0.0",
    "jupyter>=1.1.1,<2.0.0",
    "ipykernel>=6.29.0,<7.0.0",
    "beautifulsoup4 (>=4.14.3,<5.0.0)",
    "lxml (>=6.0.2,<7.0.0)"
]

[project.optional-dependencies]
# Optional: more robust HTML parsing backend. The code falls back to stdlib if not installed.
html = [
    "beautifulsoup4>=4.12.0,<5.0.0",
    "lxml>=5.0.0,<6.0.0"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
